<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      width: 1280px; 
      height: 640px; 
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
    }
    .container {
      text-align: center;
      color: white;
    }
    .logo {
      width: 120px;
      height: 120px;
      margin: 0 auto 30px;
      position: relative;
    }
    .logo svg {
      width: 100%;
      height: 100%;
    }
    h1 {
      font-size: 72px;
      font-weight: 700;
      margin-bottom: 20px;
      letter-spacing: -2px;
      background: linear-gradient(135deg, #fff 0%, #e94560 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .tagline {
      font-size: 28px;
      color: #a0a0a0;
      margin-bottom: 40px;
      font-weight: 300;
    }
    .features {
      display: flex;
      justify-content: center;
      gap: 40px;
      font-size: 18px;
      color: #e94560;
    }
    .feature {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .feature::before {
      content: "◆";
      color: #e94560;
    }
    .bg-pattern {
      position: absolute;
      width: 100%;
      height: 100%;
      opacity: 0.03;
      background-image: 
        radial-gradient(circle at 20% 50%, #e94560 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, #0f3460 0%, transparent 50%),
        radial-gradient(circle at 40% 20%, #16213e 0%, transparent 50%);
    }
  </style>
</head>
<body>
  <div class="bg-pattern"></div>
  <div class="container">
    <div class="logo">
      <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <circle cx="100" cy="100" r="95" fill="#1a1a2e" stroke="#16213e" stroke-width="2"/>
        <g stroke="#0f3460" stroke-width="2" opacity="0.6">
          <line x1="100" y1="60" x2="70" y2="100"/>
          <line x1="100" y1="60" x2="130" y2="100"/>
          <line x1="70" y1="100" x2="130" y2="100"/>
          <line x1="100" y1="60" x2="100" y2="140"/>
          <line x1="70" y1="100" x2="100" y2="140"/>
          <line x1="130" y1="100" x2="100" y2="140"/>
        </g>
        <circle cx="100" cy="100" r="18" fill="#e94560"/>
        <circle cx="100" cy="100" r="12" fill="#1a1a2e"/>
        <text x="100" y="105" text-anchor="middle" fill="#e94560" font-size="14" font-weight="bold" font-family="system-ui">A</text>
        <g fill="#16213e" stroke="#e94560" stroke-width="2">
          <circle cx="100" cy="60" r="12"/>
          <circle cx="130" cy="100" r="12"/>
          <circle cx="115" cy="135" r="12"/>
          <circle cx="85" cy="135" r="12"/>
          <circle cx="70" cy="100" r="12"/>
        </g>
        <g fill="#e94560">
          <circle cx="100" cy="60" r="4"/>
          <circle cx="130" cy="100" r="4"/>
          <circle cx="115" cy="135" r="4"/>
          <circle cx="85" cy="135" r="4"/>
          <circle cx="70" cy="100" r="4"/>
        </g>
      </svg>
    </div>
    <h1>AgentCrew</h1>
    <p class="tagline">OpenClaw 多 Agent 协作系统</p>
    <div class="features">
      <span class="feature">7 个专业 Agent</span>
      <span class="feature">A2A 实时通信</span>
      <span class="feature">Discord 集成</span>
    </div>
  </div>
</body>
</html>
